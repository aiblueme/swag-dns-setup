services:
  swag-guide:
    build: .
    image: swag-guide
    container_name: swag-guide
    restart: unless-stopped
    networks:
      - swag-network
    labels:
      - "swag=enable"
      - "swag_address=swag-guide"
      - "swag_port=80"
      - "swag_url=swag-guide.shellnode.lol"
      - "homepage.instance=my-vps"
      - "homepage.name=SWAG Guide"
      - "homepage.group=Docs"
      - "homepage.href=https://swag-guide.shellnode.lol"
      - "homepage.icon=mdi-book-open"
      - "homepage.description=SWAG DNS setup checklist"

networks:
  swag-network:
    external: true
